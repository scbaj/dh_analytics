<style>
:root{--bg:#0b0d12;--surf:#111318;--surf2:#181c24;--border:#1e2330;--text:#dde2f0;--sub:#6a728a;--dim:#2e3448;--accent:#e8c84a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--accent)}
.badge{font-family:'DM Mono',monospace;font-size:.55rem;background:#1a2744;color:var(--accent);border:1px solid #2d4a8a;padding:2px 8px;border-radius:3px;letter-spacing:.08em}
.controls{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
.ctrl-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
select{background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;padding:5px 10px;outline:none;cursor:pointer;min-width:160px;transition:border-color .15s}
select:focus{border-color:var(--accent)}
.stat-bar{display:flex;gap:24px;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-val{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--accent)}
.stat-lbl{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.pitch-pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.pill{font-family:'DM Mono',monospace;font-size:.55rem;padding:2px 8px;border-radius:3px;border:1px solid;letter-spacing:.06em}
#plot-container{flex:1;overflow:auto;padding:8px 12px}
#plot{width:100%;min-height:400px}
.empty-state{display:flex;align-items:center;justify-content:center;height:300px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--dim);letter-spacing:.08em}
</style>
</head>

const COLORS={"Four-Seam":"#4a90d9","Slider":"#e05c5c","Curveball":"#4DAF4A","Sinker":"#FF7F00","Changeup":"#7FDBFF","Cutter":"#984EA3","Sweeper":"#FF1493","Slurve":"#2E8B57","Splitter":"#FF6347"};
const SZ={"top": 3.673333, "bot": 1.524166667, "left": -0.83083333, "right": 0.83083333};
const SZ_TOP=SZ.top,SZ_BOT=SZ.bot,SZ_LEFT=SZ.left,SZ_RIGHT=SZ.right;
const selPitcher=document.getElementById('sel-pitcher');
const selDate=document.getElementById('sel-date');
Object.keys(DATA).sort().forEach(name=>{const o=document.createElement('option');o.value=o.textContent=name;selPitcher.appendChild(o);});
function onPitcherChange(){
  const pitcher=selPitcher.value;selDate.innerHTML='';
  Object.keys(DATA[pitcher]).sort().reverse().forEach(d=>{const o=document.createElement('option');o.value=o.textContent=d;selDate.appendChild(o);});
  renderPlot();
}
function updateStats(pitches){
  const n=pitches.length;
  const velos=pitches.map(p=>p.velo).filter(v=>v!=null);
  const avgVelo=velos.length?(velos.reduce((a,b)=>a+b,0)/velos.length).toFixed(1)+' mph':'—';
  const swingCalls=['FoulBallNotFieldable','FoulBallFieldable','InPlay','StrikeSwinging'];
  const swings=pitches.filter(p=>swingCalls.includes(p.result));
  const whiffs=pitches.filter(p=>p.result==='StrikeSwinging');
  const inZone=pitches.filter(p=>p.x!=null&&p.y!=null&&p.x>=SZ_LEFT&&p.x<=SZ_RIGHT&&p.y>=SZ_BOT&&p.y<=SZ_TOP);
  const outZone=pitches.filter(p=>p.x!=null&&p.y!=null&&!(p.x>=SZ_LEFT&&p.x<=SZ_RIGHT&&p.y>=SZ_BOT&&p.y<=SZ_TOP));
  const chaseSwings=outZone.filter(p=>swingCalls.includes(p.result));
  document.getElementById('s-pitches').textContent=n;
  document.getElementById('s-velo').textContent=avgVelo;
  document.getElementById('s-zone').textContent=n?(inZone.length/n*100).toFixed(1)+'%':'—';
  document.getElementById('s-whiff').textContent=swings.length?(whiffs.length/swings.length*100).toFixed(1)+'%':'—';
  document.getElementById('s-chase').textContent=outZone.length?(chaseSwings.length/outZone.length*100).toFixed(1)+'%':'—';
  const pills=document.getElementById('pitch-pills');pills.innerHTML='';
  const types=[...new Set(pitches.map(p=>p.pt))].sort();
  types.forEach(pt=>{
    const cnt=pitches.filter(p=>p.pt===pt).length;
    const col=COLORS[pt]||'#aaa';
    const pill=document.createElement('span');pill.className='pill';
    pill.style.cssText=`color:${col};border-color:${col}22;background:${col}15`;
    pill.textContent=pt+' '+(cnt/n*100).toFixed(0)+'%';pills.appendChild(pill);
  });
}
function renderPlot(){
  const pitcher=selPitcher.value,date=selDate.value;
  if(!pitcher||!date)return;
  const pitches=DATA[pitcher][date];
  const pitchTypes=[...new Set(pitches.map(p=>p.pt))].sort();
  updateStats(pitches);
  const nCols=2,nRows=Math.ceil((pitchTypes.length+1)/nCols);
  const traces=[];
  function addPanel(subset,row,col,showLegend){
    const suf=(row===1&&col===1)?'':String((row-1)*nCols+col);
    const xax='x'+suf,yax='y'+suf;
    [[[SZ_LEFT,SZ_RIGHT],[SZ_BOT,SZ_BOT]],[[SZ_LEFT,SZ_RIGHT],[SZ_TOP,SZ_TOP]],
     [[SZ_LEFT,SZ_LEFT],[SZ_BOT,SZ_TOP]],[[SZ_RIGHT,SZ_RIGHT],[SZ_BOT,SZ_TOP]]
    ].forEach(([x,y])=>traces.push({x,y,mode:'lines',type:'scatter',line:{color:'rgba(220,220,220,0.55)',width:2},showlegend:false,hoverinfo:'skip',xaxis:xax,yaxis:yax}));
    const tw=(SZ_RIGHT-SZ_LEFT)/3,th=(SZ_TOP-SZ_BOT)/3;
    for(let i=1;i<3;i++){
      traces.push({x:[SZ_LEFT+tw*i,SZ_LEFT+tw*i],y:[SZ_BOT,SZ_TOP],mode:'lines',type:'scatter',line:{color:'rgba(255,255,255,0.1)',width:1,dash:'dot'},showlegend:false,hoverinfo:'skip',xaxis:xax,yaxis:yax});
      traces.push({x:[SZ_LEFT,SZ_RIGHT],y:[SZ_BOT+th*i,SZ_BOT+th*i],mode:'lines',type:'scatter',line:{color:'rgba(255,255,255,0.1)',width:1,dash:'dot'},showlegend:false,hoverinfo:'skip',xaxis:xax,yaxis:yax});
    }
    pitchTypes.forEach(pt=>{
      const pts=subset.filter(p=>p.pt===pt);if(!pts.length)return;
      traces.push({x:pts.map(p=>p.x),y:pts.map(p=>p.y),mode:'markers',type:'scatter',name:pt,legendgroup:pt,showlegend:showLegend,
        marker:{color:COLORS[pt]||'#aaa',size:11,line:{color:'rgba(0,0,0,0.4)',width:1},opacity:0.9},
        text:pts.map(p=>['<b>'+p.pt+'</b>','Velo: '+(p.velo??'—')+' mph','HB: '+(p.hb??'—')+' in','IVB: '+(p.ivb??'—')+' in','Spin: '+(p.spin??'—')+' rpm','VAA: '+(p.vaa??'—')+'°','Result: '+p.result,'Count: '+p.balls+'-'+p.strikes,'Batter: '+p.bside].join('<br>')),
        hovertemplate:'%{text}<extra></extra>',xaxis:xax,yaxis:yax});
    });
  }
  addPanel(pitches,1,1,true);
  pitchTypes.forEach((pt,idx)=>{const ti=idx+2,row=Math.ceil(ti/nCols),col=((ti-1)%nCols)+1;addPanel(pitches.filter(p=>p.pt===pt),row,col,false);});
  const axD={range:[-2.5,2.5],zeroline:false,gridcolor:'rgba(255,255,255,0.04)',tickfont:{color:'#6a728a',size:9},color:'#6a728a',showline:false};
  const ayD={...axD,range:[0,5.0]};
  const LA={};
  for(let r=1;r<=nRows;r++)for(let c=1;c<=nCols;c++){const s=(r===1&&c===1)?'':String((r-1)*nCols+c);LA['xaxis'+s]={...axD};LA['yaxis'+s]={...ayD};}
  const allTitles=['All Pitches',...pitchTypes];
  while(allTitles.length<nRows*nCols)allTitles.push('');
  const annotations=allTitles.map((t,i)=>{
    if(!t)return null;
    const r=Math.floor(i/nCols)+1,c=(i%nCols)+1;
    const s=(r===1&&c===1)?'':String((r-1)*nCols+c);
    return{text:t,showarrow:false,xref:'x'+s+' domain',yref:'y'+s+' domain',x:0.5,y:1.08,xanchor:'center',yanchor:'bottom',font:{size:13,color:'#c9d1d9',family:'Barlow Condensed, sans-serif'}};
  }).filter(Boolean);
  Plotly.react('plot',traces,{
    ...LA,grid:{rows:nRows,columns:nCols,pattern:'independent'},
    height:nRows*400+80,paper_bgcolor:'#0b0d12',plot_bgcolor:'#111318',
    font:{color:'#dde2f0',family:'DM Mono, monospace'},
    title:{text:'<b>'+pitcher+'</b>  ·  '+date,x:0.5,xanchor:'center',font:{size:20,color:'#e8c84a',family:'Bebas Neue, sans-serif'}},
    annotations,
    legend:{bgcolor:'rgba(17,19,24,0.95)',bordercolor:'#1e2330',borderwidth:1,font:{size:12,color:'#dde2f0'},itemsizing:'constant',title:{text:'Pitch Type',font:{color:'#6a728a',size:11}}},
    hoverlabel:{bgcolor:'#181c24',bordercolor:'#2e3448',font:{size:13,family:'DM Mono, monospace',color:'#dde2f0'}},
    margin:{t:80,b:20,l:50,r:20}
  },{scrollZoom:true,displayModeBar:true,responsive:true});
}
if(Object.keys(DATA).length>0)onPitcherChange();
else document.getElementById('plot').innerHTML='<div class="empty-state">No pitcher data found.</div>';
</script>
