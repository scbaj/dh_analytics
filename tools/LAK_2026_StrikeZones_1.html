const COLORS={"Four-Seam":"#e05c5c","Slider":"#4a90d9","Curveball":"#4DAF4A","Sinker":"#FF7F00","Changeup":"#7FDBFF","Cutter":"#984EA3","Sweeper":"#FF1493","Slurve":"#2E8B57","Splitter":"#FF6347"};
const SZ={top:3.673333,bot:1.524166667,left:-0.83083333,right:0.83083333};

const selPitcher=document.getElementById('sel-pitcher');
const selDate=document.getElementById('sel-date');
Object.keys(DATA).sort().forEach(name=>{
  const o=document.createElement('option');o.value=o.textContent=name;selPitcher.appendChild(o);
});

function onPitcherChange(){
  const pitcher=selPitcher.value;
  selDate.innerHTML='';
  Object.keys(DATA[pitcher]).sort().reverse().forEach(d=>{
    const o=document.createElement('option');o.value=o.textContent=d;selDate.appendChild(o);
  });
  renderPlot();
}

function renderPlot(){
  const pitcher=selPitcher.value, date=selDate.value;
  if(!pitcher||!date) return;
  const pitches=DATA[pitcher][date];
  const pitchTypes=[...new Set(pitches.map(p=>p.pt))].sort();
  const nCols=2, nRows=Math.ceil((pitchTypes.length+1)/nCols);

  // Zone border traces
  function zoneBorder(xax,yax){
    return [
      [[SZ.left,SZ.right],[SZ.bot,SZ.bot]],
      [[SZ.left,SZ.right],[SZ.top,SZ.top]],
      [[SZ.left,SZ.left],[SZ.bot,SZ.top]],
      [[SZ.right,SZ.right],[SZ.bot,SZ.top]]
    ].map(([x,y])=>({x,y,mode:'lines',type:'scatter',
      line:{color:'#ff3333',width:2.5},showlegend:false,hoverinfo:'skip',
      xaxis:xax,yaxis:yax}));
  }

  function pitchTraces(subset, xax, yax, showLegend){
    return pitchTypes.map(pt=>{
      const pts=subset.filter(p=>p.pt===pt);
      if(!pts.length) return null;
      return {
        x:pts.map(p=>p.x), y:pts.map(p=>p.y),
        mode:'markers', type:'scatter',
        name:pt, legendgroup:pt, showlegend:showLegend,
        marker:{color:COLORS[pt]||'#aaa',size:10,
          line:{color:'white',width:0.8},opacity:0.85},
        text:pts.map(p=>[
          '<b>'+p.pt+'</b>',
          'Velo: '+(p.v??'—')+' mph',
          'HB: '+(p.hb??'—')+' in',
          'IVB: '+(p.ivb??'—')+' in',
          'Spin: '+(p.sp??'—')+' rpm',
          'VAA: '+(p.va??'—')+'°',
          'Result: '+p.r,
          'Count: '+p.b+'-'+p.s,
          'Batter: '+p.bs
        ].join('<br>')),
        hovertemplate:'%{text}<extra></extra>',
        xaxis:xax, yaxis:yax
      };
    }).filter(Boolean);
  }

  const traces=[];
  // Panel 1: All Pitches
  traces.push(...zoneBorder('x','y'));
  traces.push(...pitchTraces(pitches,'x','y',true));

  // Per pitch type panels
  pitchTypes.forEach((pt,idx)=>{
    const ti=idx+2;
    const row=Math.ceil(ti/nCols), col=((ti-1)%nCols)+1;
    const suf=String((row-1)*nCols+col);
    const xax='x'+suf, yax='y'+suf;
    traces.push(...zoneBorder(xax,yax));
    traces.push(...pitchTraces(pitches.filter(p=>p.pt===pt),xax,yax,false));
  });

  // Axis config — match original notebook exactly
  const axX={range:[-2.5,2.5],title:'Horizontal (ft)',zeroline:false,fixedrange:true};
  const axY={range:[0,5.0],   title:'Vertical (ft)',  zeroline:false,fixedrange:true};
  const LA={};
  for(let r=1;r<=nRows;r++) for(let c=1;c<=nCols;c++){
    const s=(r===1&&c===1)?'':String((r-1)*nCols+c);
    LA['xaxis'+s]={...axX}; LA['yaxis'+s]={...axY};
  }

  // Subplot titles as annotations
  const allTitles=['All Pitches',...pitchTypes];
  while(allTitles.length<nRows*nCols) allTitles.push('');
  const annotations=allTitles.map((t,i)=>{
    if(!t) return null;
    const r=Math.floor(i/nCols)+1, c=(i%nCols)+1;
    const s=(r===1&&c===1)?'':String((r-1)*nCols+c);
    return{text:t,showarrow:false,
      xref:'x'+s+' domain',yref:'y'+s+' domain',
      x:0.5,y:1.08,xanchor:'center',yanchor:'bottom',
      font:{size:13,color:'#c9d1d9',family:'monospace'}};
  }).filter(Boolean);

  Plotly.react('plot', traces, {
    ...LA,
    grid:{rows:nRows,columns:nCols,pattern:'independent'},
    height:nRows*420+80,width:1100,
    paper_bgcolor:'#0d1117', plot_bgcolor:'#161b22',
    font:{color:'#e6edf3',family:'monospace'},
    title:{text:'<b>'+pitcher+'</b>  ·  '+date,x:0.5,xanchor:'center',
      font:{size:20,color:'#e8c84a',family:'Bebas Neue, sans-serif'}},
    annotations,
    legend:{bgcolor:'rgba(22,27,34,0.9)',bordercolor:'#30363d',borderwidth:1,
      font:{size:12},itemsizing:'constant',title:{text:'Pitch Type'}},
    hoverlabel:{bgcolor:'#1c2128',bordercolor:'#444c56',
      font:{size:13,family:'monospace',color:'#e6edf3'}},
    margin:{t:80,b:40,l:50,r:30}
  },{scrollZoom:false,displayModeBar:false,responsive:true});
}

if(Object.keys(DATA).length>0) onPitcherChange();
else document.getElementById('plot').innerHTML='<div class="empty-state">No data found.</div>';
</script>
